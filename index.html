<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>どこでも飲みゲー</title>
    <meta
      name="description"
      content="ルーレット、お酒判断、チンチロ、キングスカップなどをどこでも遊べる飲みゲームポータル。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Outfit:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <img class="hero__image" src="./assets/hero-party-table.png" alt="" />
      <div class="hero__shade"></div>
      <nav class="topbar" aria-label="サイト">
        <a class="brand" href="./index.html" aria-label="どこでも飲みゲー ホーム">
          <span class="brand__mark">DG</span>
          <span>どこでも飲みゲー</span>
        </a>
        <a class="topbar__link" href="#games">ゲーム一覧</a>
      </nav>
      <section class="hero__content" aria-labelledby="page-title">
        <p class="hero__eyebrow">party games in your pocket</p>
        <h1 id="page-title">どこでも<br />飲みゲー</h1>
        <p class="hero__copy">
          飲み会の流れを止めずに、タップだけで次のゲームへ。公開済みゲームからすぐ遊べます。
        </p>
        <a class="hero__button" href="#games">遊ぶゲームを選ぶ</a>
      </section>
    </header>

    <main>
      <section class="intro" aria-label="サイト概要">
        <div>
          <p class="section-kicker">lineup</p>
          <h2>ノリで選べるゲーム入口</h2>
        </div>
        <p>
          公開済みのゲームはすぐ開けます。準備中のゲームも入口だけ先に並べて、次の追加に備えています。
        </p>
      </section>

      <section class="games" id="games" aria-label="ゲーム一覧">
        <div class="game-grid" id="gameGrid"></div>
      </section>
    </main>

    <footer class="footer">
      <span>どこでも飲みゲー</span>
      <span>Drink responsibly.</span>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
